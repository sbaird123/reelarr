<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Reelarr — Discover Movie &amp; TV Trailers</title>
  <meta name="description" content="Discover movie &amp; TV trailers, TikTok-style. Swipe upcoming films and shows, build watchlists, sync with Radarr/Sonarr/Trakt, and share with friends." />
  <link rel="canonical" href="https://reelarr.app/" />
  <meta name="robots" content="index,follow" />
  <meta name="theme-color" content="#0a0a0a" />

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%23e50914'/><text x='16' y='23' font-family='-apple-system,Segoe UI,sans-serif' font-size='20' font-weight='800' fill='white' text-anchor='middle'>R</text></svg>" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <link rel="manifest" href="/manifest.webmanifest" />

  <!-- Open Graph (Facebook, LinkedIn, iMessage, Slack, etc.) -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Reelarr" />
  <meta property="og:title" content="Reelarr — Discover Movie &amp; TV Trailers" />
  <meta property="og:description" content="Discover movie &amp; TV trailers, TikTok-style. Swipe upcoming films and shows, build watchlists, sync with Radarr/Sonarr/Trakt, and share with friends." />
  <meta property="og:url" content="https://reelarr.app/" />
  <meta property="og:image" content="https://reelarr.app/og.png" />
  <meta property="og:image:type" content="image/png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="Reelarr — discover movie and TV trailers" />

  <!-- Twitter / X card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Reelarr — Discover Movie &amp; TV Trailers" />
  <meta name="twitter:description" content="Discover movie &amp; TV trailers, TikTok-style. Swipe, build watchlists, sync with Radarr/Sonarr/Trakt, and share with friends." />
  <meta name="twitter:image" content="https://reelarr.app/og.png" />

  <!-- Structured data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Reelarr",
    "url": "https://reelarr.app/",
    "description": "Discover movie & TV trailers, TikTok-style. Swipe upcoming films and shows, build watchlists, sync with Radarr/Sonarr/Trakt, and share with friends.",
    "applicationCategory": "EntertainmentApplication",
    "operatingSystem": "Web",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
  }
  </script>

  <!-- Preconnect to origins we fetch from on first paint -->
  <link rel="preconnect" href="https://i.ytimg.com" crossorigin />
  <link rel="preconnect" href="https://www.youtube.com" crossorigin />
  <link rel="preconnect" href="https://www.google.com" crossorigin />
  <link rel="preconnect" href="https://image.tmdb.org" crossorigin />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="dns-prefetch" href="https://www.googlevideo.com" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Semantic H1 for crawlers; visually hidden (the app's own header is the visible brand). -->
  <h1 class="sr-only">Reelarr — discover movie &amp; TV show trailers, TikTok-style</h1>

  <!-- Fallback for crawlers/users without JavaScript. -->
  <noscript>
    <div style="max-width:640px;margin:80px auto;padding:0 24px;font-family:-apple-system,Segoe UI,sans-serif;color:#f0f0f0;text-align:center">
      <h2 style="color:#e50914">Reelarr</h2>
      <p>Reelarr is a fast, TikTok-style way to discover movie and TV show trailers — swipe through what's upcoming, build watchlists, sync them with Radarr, Sonarr &amp; Trakt, and share with friends.</p>
      <p>Please enable JavaScript to use Reelarr.</p>
    </div>
  </noscript>

  <!-- Top bar -->
  <header id="topbar">
    <div id="logo">Reelarr</div>
    <div id="mode-toggle">
      <button class="mode-btn active" data-mode="movies">Movies</button>
      <button class="mode-btn" data-mode="tv">TV</button>
    </div>
    <select id="mode-select" class="topbar-select" aria-label="Movies or TV">
      <option value="movies">Movies</option>
      <option value="tv">TV</option>
    </select>
    <div id="nav-tabs">
      <!-- tabs injected by JS -->
    </div>
    <select id="list-select" class="topbar-select" aria-label="List">
      <!-- options injected by JS -->
    </select>
    <button id="search-btn" title="Search">&#128269;</button>
    <button id="lists-btn" title="My Lists" hidden>
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
        <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
      </svg>
    </button>
    <button id="friends-btn" title="Friends" hidden>
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      <span id="friends-badge" class="hidden">0</span>
    </button>
    <button id="notif-btn" title="Notifications" hidden>
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      <span id="notif-badge" class="hidden">0</span>
    </button>
    <div id="auth-slot"></div>
    <!-- Mobile-only: collapses search / lists / friends / notifications / account
         into one menu so the header controls stop overlapping on small phones. -->
    <button id="menu-btn" title="Menu" aria-haspopup="true" aria-expanded="false">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
      <span id="menu-dot" class="hidden"></span>
    </button>
  </header>

  <!-- Mobile menu dropdown (populated by JS) + tap-away backdrop -->
  <div id="menu-backdrop" class="hidden"></div>
  <div id="topbar-menu" class="hidden" role="menu"></div>

  <!-- Signed-out sign-in strip (always-visible entry point; hidden once signed in) -->
  <div id="signin-banner" class="hidden">
    <span class="signin-banner-text">Sign in to save lists, add friends &amp; sync your watchlist.</span>
    <button id="signin-banner-btn">Sign in</button>
    <button id="signin-banner-close" title="Dismiss">&#10005;</button>
  </div>

  <!-- Search overlay -->
  <div id="search-overlay" class="hidden">
    <div id="search-bar">
      <input id="search-input" type="text" placeholder="Search..." autocomplete="off" />
      <button id="search-close">&#10005;</button>
    </div>
    <div id="search-results"></div>
  </div>

  <!-- Lists overlay (My Lists manager) -->
  <div id="lists-overlay" class="hidden">
    <div id="lists-bar">
      <h2 id="lists-heading">My Lists</h2>
      <button id="lists-close">&#10005;</button>
    </div>
    <div id="lists-body"></div>
  </div>

  <!-- Notifications overlay -->
  <div id="notif-overlay" class="hidden">
    <div id="notif-bar">
      <h2>Notifications</h2>
      <button id="notif-close">&#10005;</button>
    </div>
    <div id="notif-body"></div>
  </div>

  <!-- Recommend-to-friend bottom sheet -->
  <div id="rec-overlay" class="hidden">
    <div id="rec-sheet">
      <div id="rec-head">
        <span id="rec-title">Recommend to a friend</span>
        <button id="rec-close">&#10005;</button>
      </div>
      <input id="rec-note" type="text" placeholder="Add a note (optional)…" autocomplete="off" maxlength="300" />
      <div id="rec-friends"></div>
    </div>
  </div>

  <!-- Add-to-list bottom sheet -->
  <div id="picker-overlay" class="hidden">
    <div id="picker-sheet">
      <div id="picker-head">
        <span id="picker-title">Add to list</span>
        <button id="picker-close">&#10005;</button>
      </div>
      <div id="picker-lists"></div>
      <form id="picker-new">
        <input id="picker-new-name" type="text" placeholder="New list name…" autocomplete="off" maxlength="100" />
        <button type="submit" id="picker-new-btn">Create</button>
      </form>
    </div>
  </div>

  <!-- Friends overlay -->
  <div id="friends-overlay" class="hidden">
    <div id="friends-bar">
      <h2>Friends</h2>
      <button id="friends-close">&#10005;</button>
    </div>
    <div id="friends-body"></div>
  </div>

  <!-- Main swiper -->
  <div class="swiper" id="main-swiper">
    <div class="swiper-wrapper" id="swiper-wrapper">
      <!-- slides injected by JS -->
    </div>
  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <!-- Muted-autoplay hint (shown only on cold load before any user gesture) -->
  <div id="mute-hint">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3a4.5 4.5 0 0 0-2.5-4.03v8.05A4.5 4.5 0 0 0 16.5 12zM14 3.23v2.06a7 7 0 0 1 0 13.42v2.06a9 9 0 0 0 0-17.54z"/>
    </svg>
    <span>Tap for sound</span>
  </div>

  <!-- Loading (hidden by default — SSR hydrates first paint; shown only on tab switches) -->
  <div id="loading-overlay" class="hidden">
    <div class="spinner"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
