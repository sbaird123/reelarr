<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Settings — Reelarr</title>
  <link rel="stylesheet" href="arr.css" />
</head>
<body class="arr-body">
  <div id="arr-layout">
    <aside id="arr-sidebar">
      <div class="brand">
        <div class="brand-logo">R</div>
        <div class="brand-name">Reelarr</div>
      </div>
      <nav class="arr-nav">
        <a href="/" class="arr-nav-item">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="23 7 16 12 23 17 23 7"/>
            <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
          </svg>
          Browse
        </a>
        <a href="/settings" class="arr-nav-item active">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
          Settings
        </a>
      </nav>
      <div class="arr-nav-footer">v0.1.0</div>
    </aside>

    <main id="arr-main">
      <header id="arr-header">
        <div class="arr-header-left">
          <h1>Settings</h1>
          <div class="arr-header-sub">Configure Reelarr</div>
        </div>
        <div class="arr-header-right">
          <button id="btn-save" class="arr-btn arr-btn-primary" disabled>
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            Save Changes
          </button>
          <button id="btn-revert" class="arr-btn" disabled>Revert</button>
        </div>
      </header>

      <section id="arr-content">
        <!-- General ─────────────────────────────────────────────────────── -->
          <div class="arr-panel">
            <div class="arr-panel-header">
              <h2>TMDB (The Movie Database)</h2>
              <div class="arr-panel-sub">Source of trailers, metadata and artwork</div>
            </div>
            <div class="arr-panel-body">
              <div class="form-row">
                <div class="form-label">
                  <label for="tmdb_api_key">API Key</label>
                  <div class="form-help">
                    Get a free API key from
                    <a href="https://www.themoviedb.org/settings/api" target="_blank" rel="noopener">themoviedb.org</a>
                  </div>
                </div>
                <div class="form-input">
                  <div class="input-with-action">
                    <input type="password" id="tmdb_api_key" placeholder="TMDB v3 API key" autocomplete="off" />
                    <button type="button" class="arr-btn arr-btn-ghost show-pw" data-target="tmdb_api_key" title="Show/hide">👁</button>
                  </div>
                  <div class="form-test">
                    <button type="button" class="arr-btn" id="test-tmdb">Test</button>
                    <span class="test-result" id="test-tmdb-result"></span>
                  </div>
                </div>
              </div>
            </div>
          </div>
      </section>
    </main>
  </div>

  <div id="arr-toast"></div>

  <script src="settings.js"></script>
</body>
</html>
